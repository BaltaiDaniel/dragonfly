<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Icons Exploding from Shopping Cart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /*background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);*/
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 8px;
            cursor: pointer;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            font-size: 14px;
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        button {
            background: #ff6b6b;
            border: none;
            color: white;
            padding: 8px 20px;
            margin: 0 10px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background: #ff5252;
        }
        
        .instructions {
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="1920" height="1080"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 1920;
        canvas.height = 1080;
        
        // Cart position (bottom center)
        const cartX = canvas.width / 2;
        const cartY = canvas.height - 100;
        
        // Load custom images
        const cartImage = new Image();
        const gamepadImage = new Image();
        
        // Set your local file paths here
        cartImage.src = 'basket-shopping.svg';  // Replace with your cart icon file path
        gamepadImage.src = 'gamepad.svg';  // Replace with your gamepad icon file path
        
        // Fallback icons (outlined SVG-style) if images don't load
        class IconLibrary {
            static drawGamepad(ctx, x, y, size, opacity) {
                ctx.save();
                ctx.translate(x, y);
                ctx.strokeStyle = `rgba(255, 215, 100, ${opacity})`;
                ctx.fillStyle = `rgba(255, 215, 100, ${opacity * 0.1})`;
                ctx.lineWidth = 3;
                
                // Gamepad body
                ctx.beginPath();
                ctx.roundRect(-size/2, -size/3, size, size*0.66, size*0.1);
                ctx.stroke();
                
                // D-pad
                ctx.beginPath();
                ctx.rect(-size*0.35, -size*0.15, size*0.2, size*0.3);
                ctx.stroke();
                
                // ABXY buttons
                ctx.beginPath();
                ctx.arc(size*0.25, size*0.1, size*0.08, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(size*0.25, -size*0.1, size*0.08, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(size*0.1, 0, size*0.08, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.restore();
            }
            
            static drawController(ctx, x, y, size, opacity) {
                ctx.save();
                ctx.translate(x, y);
                ctx.strokeStyle = `rgba(255, 215, 100, ${opacity})`;
                ctx.fillStyle = `rgba(255, 215, 100, ${opacity * 0.1})`;
                ctx.lineWidth = 3;
                
                // Controller body
                ctx.beginPath();
                ctx.roundRect(-size/2, -size/3, size, size*0.66, size*0.1);
                ctx.stroke();
                
                // Grip areas
                ctx.beginPath();
                ctx.rect(-size*0.45, -size*0.2, size*0.12, size*0.4);
                ctx.stroke();
                ctx.beginPath();
                ctx.rect(size*0.33, -size*0.2, size*0.12, size*0.4);
                ctx.stroke();
                
                // Buttons
                ctx.beginPath();
                ctx.arc(size*0.25, 0, size*0.08, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(-size*0.25, 0, size*0.08, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.restore();
            }
            
            static drawJoystick(ctx, x, y, size, opacity) {
                ctx.save();
                ctx.translate(x, y);
                ctx.strokeStyle = `rgba(255, 215, 100, ${opacity})`;
                ctx.lineWidth = 3;
                
                // Joystick base
                ctx.beginPath();
                ctx.arc(0, 0, size*0.4, 0, Math.PI * 2);
                ctx.stroke();
                
                // Joystick stick
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(0, -size*0.3);
                ctx.stroke();
                
                // Joystick top
                ctx.beginPath();
                ctx.arc(0, -size*0.3, size*0.12, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.restore();
            }
            
            static drawPuzzle(ctx, x, y, size, opacity) {
                ctx.save();
                ctx.translate(x, y);
                ctx.strokeStyle = `rgba(255, 215, 100, ${opacity})`;
                ctx.lineWidth = 3;
                
                ctx.beginPath();
                ctx.roundRect(-size*0.35, -size*0.35, size*0.7, size*0.7, size*0.08);
                ctx.stroke();
                
                // Puzzle tab
                ctx.beginPath();
                ctx.arc(-size*0.15, -size*0.45, size*0.1, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.restore();
            }
            
            static drawStar(ctx, x, y, size, opacity) {
                ctx.save();
                ctx.translate(x, y);
                ctx.strokeStyle = `rgba(255, 215, 100, ${opacity})`;
                ctx.lineWidth = 3;
                
                const spikes = 5;
                const outerR = size * 0.4;
                const innerR = size * 0.16;
                
                ctx.beginPath();
                for (let i = 0; i < spikes * 2; i++) {
                    const radius = i % 2 === 0 ? outerR : innerR;
                    const angle = (Math.PI * 2 * i) / (spikes * 2) - Math.PI / 2;
                    const xPos = radius * Math.cos(angle);
                    const yPos = radius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(xPos, yPos);
                    else ctx.lineTo(xPos, yPos);
                }
                ctx.closePath();
                ctx.stroke();
                
                ctx.restore();
            }
            
            static drawHeart(ctx, x, y, size, opacity) {
                ctx.save();
                ctx.translate(x, y);
                ctx.strokeStyle = `rgba(255, 215, 100, ${opacity})`;
                ctx.lineWidth = 3;
                
                ctx.beginPath();
                ctx.moveTo(0, size*0.2);
                ctx.bezierCurveTo(-size*0.3, -size*0.1, -size*0.4, -size*0.25, 0, -size*0.4);
                ctx.bezierCurveTo(size*0.4, -size*0.25, size*0.3, -size*0.1, 0, size*0.2);
                ctx.stroke();
                
                ctx.restore();
            }
            
            static drawCoin(ctx, x, y, size, opacity) {
                ctx.save();
                ctx.translate(x, y);
                ctx.strokeStyle = `rgba(255, 215, 100, ${opacity})`;
                ctx.lineWidth = 3;
                
                ctx.beginPath();
                ctx.arc(0, 0, size*0.35, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(-size*0.2, 0);
                ctx.lineTo(size*0.2, 0);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, -size*0.2);
                ctx.lineTo(0, size*0.2);
                ctx.stroke();
                
                ctx.restore();
            }
            
            static drawSword(ctx, x, y, size, opacity) {
                ctx.save();
                ctx.translate(x, y);
                ctx.strokeStyle = `rgba(255, 215, 100, ${opacity})`;
                ctx.lineWidth = 3;
                
                ctx.beginPath();
                ctx.moveTo(0, -size*0.45);
                ctx.lineTo(0, size*0.3);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(-size*0.1, size*0.2);
                ctx.lineTo(0, size*0.3);
                ctx.lineTo(size*0.1, size*0.2);
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        // Helper for rounded rectangles
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        class FloatingIcon {
            constructor(x, y, iconType, velocity, size = 32) {
                this.x = x;
                this.y = y;
                this.iconType = iconType;
                this.velX = velocity.x;
                this.velY = velocity.y;
                this.gravity = 0.1;
                this.drag = 0.99;
                this.life = 1;
                this.size = size;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.08;
                this.customImage = null;
                
                // Use custom gamepad image if available and this is a gamepad icon
                if (iconType === 'gamepad' && gamepadImage.complete && gamepadImage.src !== 'gamepad.png') {
                    this.customImage = gamepadImage;
                }
            }
            
            update() {
                this.velY += this.gravity;
                this.velX *= this.drag;
                this.velY *= this.drag;
                this.x += this.velX;
                this.y += this.velY;
                this.rotation += this.rotationSpeed;
                
                if (this.y < 80) {
                    this.life -= 0.01;
                }
                this.life -= 0.002;
                
                return this.life > 0 && this.y < canvas.height + 100;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.life;
                ctx.shadowBlur = 4;
                ctx.shadowColor = `rgba(0, 0, 0, ${this.life * 0.5})`;
                
                if (this.customImage && this.customImage.complete) {
                    // Draw custom image
                    const imgSize = this.size * 1.2;
                    ctx.drawImage(this.customImage, -imgSize/2, -imgSize/2, imgSize, imgSize);
                } else {
                    // Draw outlined icon
                    switch(this.iconType) {
                        case 'gamepad':
                            IconLibrary.drawGamepad(ctx, 0, 0, this.size, this.life);
                            break;
                        case 'controller':
                            IconLibrary.drawController(ctx, 0, 0, this.size, this.life);
                            break;
                        case 'joystick':
                            IconLibrary.drawJoystick(ctx, 0, 0, this.size, this.life);
                            break;
                        case 'puzzle':
                            IconLibrary.drawPuzzle(ctx, 0, 0, this.size, this.life);
                            break;
                        case 'star':
                            IconLibrary.drawStar(ctx, 0, 0, this.size, this.life);
                            break;
                        case 'heart':
                            IconLibrary.drawHeart(ctx, 0, 0, this.size, this.life);
                            break;
                        case 'coin':
                            IconLibrary.drawCoin(ctx, 0, 0, this.size, this.life);
                            break;
                        case 'sword':
                            IconLibrary.drawSword(ctx, 0, 0, this.size, this.life);
                            break;
                        default:
                            IconLibrary.drawStar(ctx, 0, 0, this.size, this.life);
                    }
                }
                
                ctx.restore();
            }
        }
        
        let floatingIcons = [];
        let bagAnimationFrame = 0;
        
        // Draw the shopping cart using local image
        function drawCart() {
            if (cartImage.complete && cartImage.src !== 'cart.png') {
                // Draw custom cart image
                const cartWidth = 120;
                const cartHeight = 100;
                ctx.drawImage(cartImage, cartX - cartWidth/2, cartY - cartHeight/2, cartWidth, cartHeight);
            } else {
                // Fallback cart drawing (white-filled like 🛍️)
                ctx.save();
                ctx.shadowBlur = 0;
                
                // Cart body
                ctx.fillStyle = '#FFFFFF';
                ctx.strokeStyle = '#CCCCCC';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.roundRect(cartX - 60, cartY - 45, 120, 70, 12);
                ctx.fill();
                ctx.stroke();
                
                // Handle (like 🛍️)
                ctx.beginPath();
                ctx.arc(cartX - 35, cartY - 55, 12, 0, Math.PI * 2);
                ctx.arc(cartX + 35, cartY - 55, 12, 0, Math.PI * 2);
                ctx.fillStyle = '#DDDDDD';
                ctx.fill();
                
                // Wheels
                ctx.fillStyle = '#888888';
                ctx.beginPath();
                ctx.arc(cartX - 45, cartY - 15, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cartX + 45, cartY - 15, 8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
            
            // Shake effect during explosion
            if (bagAnimationFrame > 0) {
                ctx.save();
                ctx.translate((Math.random() - 0.5) * 4, (Math.random() - 0.5) * 3);
                // Redraw cart with shake (this is simplified)
                ctx.restore();
            }
        }
        
        // Explode icons from cart
        function explode() {
            const iconTypes = ['gamepad', 'controller', 'joystick', 'puzzle', 'star', 'heart', 'coin', 'sword'];
            const iconCount = 35;
            
            for (let i = 0; i < iconCount; i++) {
                const iconType = iconTypes[Math.floor(Math.random() * iconTypes.length)];
                const angle = (Math.PI * 2 * i) / iconCount + Math.random() * 0.5;
                const speed = 6 + Math.random() * 10;
                const velocity = {
                    x: Math.cos(angle) * speed * (Math.random() * 0.7 + 0.5),
                    y: Math.sin(angle) * speed * 0.7 - 7 - Math.random() * 5
                };
                
                floatingIcons.push(new FloatingIcon(
                    cartX + (Math.random() - 0.5) * 50,
                    cartY - 20 + Math.random() * 30,
                    iconType,
                    velocity,
                    30 + Math.random() * 12
                ));
            }
            
            bagAnimationFrame = 10;
        }
        
        // Animation loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Update and draw floating icons
            floatingIcons = floatingIcons.filter(icon => icon.update());
            floatingIcons.forEach(icon => icon.draw(ctx));
            
            // Draw cart with shake effect
            if (bagAnimationFrame > 0) {
                ctx.save();
                ctx.translate((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 2);
                drawCart();
                ctx.restore();
                bagAnimationFrame--;
            } else {
                drawCart();
            }
            
            requestAnimationFrame(animate);
        }
        
        // Wait for images to load
        let imagesLoaded = 0;
        function checkImagesLoaded() {
            imagesLoaded++;
            if (imagesLoaded === 2) {
                console.log('Images loaded, starting animation');
                animate();
            }
        }
        
        cartImage.onload = checkImagesLoaded;
        gamepadImage.onload = checkImagesLoaded;
        
        // If images fail to load, still start animation
        cartImage.onerror = () => { console.log('Cart image not found, using fallback'); checkImagesLoaded(); };
        gamepadImage.onerror = () => { console.log('Gamepad image not found, using fallback'); checkImagesLoaded(); };
        
        // Handle click/tap to explode
        canvas.addEventListener('click', () => explode());
        document.getElementById('explodeBtn').addEventListener('click', () => explode());
        
        // Start loading
        if (cartImage.complete) checkImagesLoaded();
        if (gamepadImage.complete) checkImagesLoaded();
        
        // Auto-explode on load
        setTimeout(() => explode(), 500);
    </script>
</body>
</html>
